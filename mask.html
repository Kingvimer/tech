<!DOCTYPE html>
<html>
<head>
<style>
.element {
    -webkit-mask-image: url('logo.png'); /* For WebKit browsers like Chrome, Safari */
    mask-image: url('logo.png');
    mask-repeat: no-repeat;
    mask-position: center;
    mask-size: cover;
}
</style>
</head>
<body>

<h1>The mask-image Property</h1>

<p>An image with a mask layer image:</p>
<img class="element" src="img_5terre.jpg" alt="Cinque Terre" width="600" height="400">

<p>Original image:</p>
<img src="img_5terre.jpg" alt="Cinque Terre" width="600" height="400">

</body>
</html>
